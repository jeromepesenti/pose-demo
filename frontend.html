
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Vision Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e; color: #eee;
    font-family: system-ui, sans-serif;
    min-height: 100vh;
  }
  #layout {
    display: flex; min-height: 100vh;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px; min-width: 260px;
    background: #16213e;
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    border-right: 1px solid #0f3460;
    overflow-y: auto;
  }
  #sidebar h2 {
    font-size: 0.9rem; color: #aaa;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .video-card {
    cursor: pointer; border-radius: 8px;
    overflow: hidden; background: #1a1a2e;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
  }
  .video-card:hover { border-color: #e94560; transform: scale(1.02); }
  .video-card.active { border-color: #e94560; }
  .video-card img {
    width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
  }
  .video-card .card-title {
    padding: 6px 8px; font-size: 0.75rem; color: #ccc;
    line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Main ── */
  #main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 20px;
    overflow-y: auto;
  }
  h1 { margin-bottom: 10px; font-size: 1.4rem; }
  #info { font-size: 0.85rem; color: #aaa; margin-bottom: 16px; }
  .row {
    display: flex; gap: 8px; margin-bottom: 12px;
    width: 100%; max-width: 800px; align-items: center;
  }
  #url-input {
    flex: 1; padding: 10px 14px; font-size: 1rem;
    border: 1px solid #333; border-radius: 6px;
    background: #16213e; color: #eee; outline: none;
  }
  #url-input:focus { border-color: #e94560; }
  select {
    padding: 10px 14px; font-size: 1rem;
    border: 1px solid #333; border-radius: 6px;
    background: #16213e; color: #eee; outline: none;
    cursor: pointer; flex: 1;
  }
  button {
    padding: 10px 24px; font-size: 1rem; border: none;
    border-radius: 6px; background: #e94560; color: #fff; cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: #c73650; }
  button:disabled { background: #555; cursor: wait; }
  #status { font-size: 0.9rem; color: #aaa; margin-bottom: 12px; min-height: 1.2em; }
  #output { text-align: center; width: 100%; max-width: 800px; }
  #output img {
    border-radius: 8px; width: 100%; background: #000; display: block;
  }
  #stats {
    display: flex; gap: 16px; justify-content: center;
    margin-top: 8px; font-size: 0.8rem; font-variant-numeric: tabular-nums;
  }
  .stat { padding: 4px 10px; border-radius: 4px; background: #16213e; }
  .stat-label { color: #777; }
  .stat-value { color: #eee; font-weight: 600; }
  .stat-good { color: #16c79a; }
  .stat-warn { color: #f5a623; }
  .stat-bad { color: #e94560; }
  #controls {
    display: flex; align-items: center; gap: 10px;
    margin-top: 10px; width: 100%;
  }
  #play-btn {
    padding: 8px 16px; font-size: 1.2rem; min-width: 44px;
  }

  @media (max-width: 768px) {
    #layout { flex-direction: column; }
    #sidebar {
      width: 100%; min-width: unset;
      flex-direction: row; overflow-x: auto;
      border-right: none; border-bottom: 1px solid #0f3460;
      padding: 10px;
    }
    #sidebar h2 { display: none; }
    .video-card { min-width: 160px; }
  }
</style>
</head>
<body>

<div id="layout">

  <!-- Sidebar with saved videos -->
  <div id="sidebar">
    <h2>Recent Videos</h2>
    <div id="video-list"></div>
    <div id="no-videos" style="color:#555; font-size:0.8rem; padding:8px;">
      Upload a video to get started
    </div>
  </div>

  <!-- Main content -->
  <div id="main">
    <h1>YouTube Vision Demo</h1>
    <div id="info">Pick an example video or paste a YouTube URL</div>
    <div id="backend-status" style="font-size:0.75rem;margin-bottom:8px;display:flex;align-items:center;gap:8px;">
      <span id="backend-info"></span>
      <button id="backend-toggle" onclick="toggleBackendInput()" style="padding:2px 8px;font-size:0.7rem;background:#333;border:1px solid #555;color:#aaa;border-radius:4px;cursor:pointer;">change</button>
    </div>
    <div id="backend-input-row" class="row" style="display:none;margin-bottom:8px;">
      <input id="backend-url-input" type="text" placeholder="http://gpu-ip:5005" style="flex:1;padding:6px 10px;font-size:0.85rem;border:1px solid #333;border-radius:6px;background:#16213e;color:#eee;outline:none;">
      <button onclick="setBackend()" style="padding:6px 14px;font-size:0.85rem;">Connect</button>
    </div>

    <div class="row">
      <input id="url-input" type="text" placeholder="Paste YouTube URL here...">
      <button id="go-btn" onclick="go()">Go</button>
      <span style="color:#555;">or</span>
      <label style="cursor:pointer;">
        <button onclick="document.getElementById('vid-upload').click(); return false;">Upload</button>
        <input id="vid-upload" type="file" accept="video/*" style="display:none;" onchange="uploadVideo(this)">
      </label>
    </div>

    <div class="row">
      <select id="mode-select">
        <optgroup label="MediaPipe">
          <option value="pose">Pose Estimation (MediaPipe)</option>
          <option value="shadow">Shadow Silhouette</option>
          <option value="face_mesh">Face Mesh</option>
          <option value="hands">Hand Tracking</option>
          <option value="face_detect">Face Detection</option>
          <option value="objects">Object Detection</option>
        </optgroup>
        <optgroup label="RTMPose (MMPose)">
          <option value="rtmpose_body">RTMPose Body</option>
          <option value="rtmpose_whole">RTMPose Wholebody (133 pts)</option>
          <option value="rtmpose_shadow">RTMPose Body Shadow</option>
          <option value="rtmpose_costume">RTMPose Costume Transfer</option>
        </optgroup>
        <optgroup label="YOLO">
          <option value="yolo_shadow">YOLO Shadow (per-person)</option>
        </optgroup>
        <optgroup label="Detectron2">
          <option value="d2_keypoint">Keypoint R-CNN (pose+mask)</option>
          <option value="d2_panoptic">Panoptic Segmentation</option>
          <option value="d2_densepose">DensePose (body surface)</option>
        </optgroup>
        <optgroup label="Generative" id="gen-group" style="display:none;">
          <option value="controlnet">ControlNet Pose (SD 1.5)</option>
          <option value="controlnet_video">AnimateDiff + ControlNet (video)</option>
        </optgroup>
      </select>
    </div>

    <div class="row" id="prompt-row" style="display:none;">
      <input id="prompt-input" type="text" placeholder="Describe the person..." value="person dancing, professional photo, studio lighting, high quality"
        style="flex:1; padding:10px 14px; font-size:1rem; border:1px solid #333; border-radius:6px; background:#16213e; color:#eee; outline:none;">
    </div>

    <div class="row" id="ref-row" style="display:none;">
      <label style="flex:1; display:flex; align-items:center; gap:8px; cursor:pointer;
        padding:10px 14px; border:1px dashed #555; border-radius:6px; background:#16213e; color:#aaa;">
        <span id="ref-label">Upload reference person image...</span>
        <input id="ref-input" type="file" accept="image/*" style="display:none;" onchange="uploadRef(this)">
      </label>
      <img id="ref-preview" style="display:none; height:48px; border-radius:4px;">
    </div>

    <div id="status"></div>

    <div id="output" style="display:none;">
      <img id="frame-img">
      <div id="controls">
        <button id="play-btn" onclick="togglePlay()">&#9654;</button>
      </div>
      <div id="stats">
        <div class="stat"><span class="stat-label">Process: </span><span class="stat-value" id="stat-proc">—</span></div>
        <div class="stat"><span class="stat-label">Round-trip: </span><span class="stat-value" id="stat-rtt">—</span></div>
        <div class="stat"><span class="stat-label">FPS: </span><span class="stat-value" id="stat-fps">—</span></div>
        <div class="stat"><span class="stat-label">Status: </span><span class="stat-value" id="stat-status">—</span></div>
      </div>
    </div>
  </div>

</div>

<script>
/* ── Simplified player: always streams from beginning ── */

let playing = false;
let statsInterval = null;
let backendDirectUrl = '';
let videoReady = false;

const img = document.getElementById('frame-img');
const playBtn = document.getElementById('play-btn');
const statusEl = document.getElementById('status');
const output = document.getElementById('output');

function getMode() {
  const mode = document.getElementById('mode-select').value;
  const refRow = document.getElementById('ref-row');
  const promptRow = document.getElementById('prompt-row');
  if (refRow) refRow.style.display = (mode === 'rtmpose_costume') ? 'flex' : 'none';
  if (promptRow) promptRow.style.display = mode.startsWith('controlnet') ? 'flex' : 'none';
  return mode;
}

// ── Backend discovery ──
function refreshDirectUrl() {
  fetch('/backend_direct_url').then(r => r.json()).then(d => {
    if (d.url && d.url.startsWith(':')) {
      backendDirectUrl = window.location.protocol + '//' + window.location.hostname + d.url;
    } else {
      backendDirectUrl = d.url || '';
    }
  }).catch(() => {});
}
refreshDirectUrl();
setInterval(refreshDirectUrl, 10000);

function refreshBackendStatus() {
  fetch('/backend_status').then(r => r.json()).then(s => {
    const el = document.getElementById('backend-info');
    if (s.available) {
      const url = s.url || 'unknown';
      const isLocal = url.includes('localhost') || url.includes('127.0.0.1');
      const label = isLocal ? 'local machine' : url.replace('http://', '').replace(':5005', '');
      el.innerHTML = '<span style="color:#16c79a;">&#9679;</span> Backend: <strong>' + label + '</strong>'
        + (s.cuda ? ' <span style="color:#16c79a;">(CUDA GPU)</span>' : ' <span style="color:#f5a623;">(CPU)</span>');
    } else {
      el.innerHTML = '<span style="color:#e94560;">&#9679;</span> Backend offline';
    }
    document.getElementById('backend-url-input').value = s.url || '';
  });
}
refreshBackendStatus();

function toggleBackendInput() {
  const row = document.getElementById('backend-input-row');
  row.style.display = row.style.display === 'none' ? 'flex' : 'none';
}

function setBackend() {
  const url = document.getElementById('backend-url-input').value.trim();
  if (!url) return;
  fetch('/set_backend', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url})
  }).then(() => {
    document.getElementById('backend-input-row').style.display = 'none';
    refreshBackendStatus();
    refreshDirectUrl();
  });
}

// ── Video list ──
function loadVideoList() {
  fetch('/videos').then(r => r.json()).then(videos => {
    const list = document.getElementById('video-list');
    const noVids = document.getElementById('no-videos');
    list.innerHTML = '';
    if (videos.length === 0) { noVids.style.display = 'block'; return; }
    noVids.style.display = 'none';
    videos.forEach(v => {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.onclick = () => loadVideo(v.id, v.name, card);
      card.innerHTML = '<img src="/thumbnail/' + v.id + '"><div class="card-title">' + v.name + '</div>';
      list.appendChild(card);
    });
  });
}
loadVideoList();

// ── Load a video ──
async function loadVideo(videoId, name, card) {
  stop();
  document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active'));
  if (card) card.classList.add('active');
  statusEl.textContent = 'Loading ' + (name || 'video') + '...';
  output.style.display = 'none';

  try {
    const resp = await fetch('/load_video/' + videoId);
    const data = await resp.json();
    if (data.error) { statusEl.textContent = 'Error: ' + data.error; return; }
    videoReady = true;
    output.style.display = 'block';
    getMode();
    statusEl.textContent = 'Ready — press play';
    startStream();
  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
  }
}

// ── Upload video ──
async function uploadVideo(input) {
  if (!input.files[0]) return;
  stop();
  output.style.display = 'none';
  statusEl.textContent = 'Uploading (' + (input.files[0].size / 1e6).toFixed(1) + ' MB)...';
  const formData = new FormData();
  formData.append('video', input.files[0]);
  try {
    const resp = await fetch('/upload_video', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.error) { statusEl.textContent = 'Error: ' + data.error; return; }
    videoReady = true;
    output.style.display = 'block';
    getMode();
    statusEl.textContent = 'Ready — press play';
    loadVideoList();
    startStream();
  } catch (e) {
    statusEl.textContent = 'Upload failed: ' + e.message;
  }
  input.value = '';
}

// ── YouTube download ──
async function go() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  const btn = document.getElementById('go-btn');
  btn.disabled = true;
  stop();
  output.style.display = 'none';
  statusEl.textContent = 'Downloading video...';

  try {
    const resp = await fetch('/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await resp.json();
    if (data.error) { statusEl.textContent = 'Error: ' + data.error; btn.disabled = false; return; }
    videoReady = true;
    output.style.display = 'block';
    getMode();
    statusEl.textContent = 'Ready — press play';
    loadVideoList();
    startStream();
  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
  }
  btn.disabled = false;
}

// ── Streaming ──
function startStream() {
  if (!videoReady) return;
  stop();
  playing = true;
  playBtn.innerHTML = '&#9646;&#9646;';
  const mode = getMode();
  statusEl.textContent = 'Streaming — ' + document.getElementById('mode-select').selectedOptions[0].text;

  const base = backendDirectUrl || '';
  let streamUrl = base + '/stream/' + mode + '?t=0';
  if (mode.startsWith('controlnet')) {
    const prompt = document.getElementById('prompt-input');
    if (prompt) streamUrl += '&prompt=' + encodeURIComponent(prompt.value.trim());
  }

  img.src = streamUrl;

  // Poll stats
  statsInterval = setInterval(() => {
    if (!playing) return;
    const statsBase = backendDirectUrl || '';
    fetch(statsBase + '/stream_stats').then(r => r.json()).then(s => {
      const procEl = document.getElementById('stat-proc');
      procEl.textContent = s.proc_ms + 'ms';
      procEl.className = 'stat-value ' + (s.proc_ms < 33 ? 'stat-good' : s.proc_ms < 100 ? 'stat-warn' : 'stat-bad');

      document.getElementById('stat-rtt').textContent = 'stream';
      document.getElementById('stat-rtt').className = 'stat-value stat-good';

      const fpsEl = document.getElementById('stat-fps');
      fpsEl.textContent = s.fps;
      fpsEl.className = 'stat-value ' + (s.fps >= 24 ? 'stat-good' : s.fps >= 10 ? 'stat-warn' : 'stat-bad');

      const statusEl2 = document.getElementById('stat-status');
      if (s.fps >= 20) { statusEl2.textContent = 'Real-time'; statusEl2.className = 'stat-value stat-good'; }
      else if (s.fps >= 10) { statusEl2.textContent = 'Slight lag'; statusEl2.className = 'stat-value stat-warn'; }
      else if (s.fps > 0) { statusEl2.textContent = 'Lagging'; statusEl2.className = 'stat-value stat-bad'; }
    }).catch(() => {});
  }, 500);
}

function stop() {
  playing = false;
  playBtn.innerHTML = '&#9654;';
  if (statsInterval) { clearInterval(statsInterval); statsInterval = null; }
  img.src = '';
}

function togglePlay() {
  if (playing) { stop(); statusEl.textContent = 'Paused'; }
  else { startStream(); }
}

// ── Mode change: restart stream ──
document.getElementById('mode-select').addEventListener('change', () => {
  getMode();
  if (videoReady && playing) startStream();
});

// ── Modes from backend ──
fetch('/modes').then(r => r.json()).then(modes => {
  if (modes.includes('controlnet')) {
    const g = document.getElementById('gen-group');
    if (g) g.style.display = '';
  }
  const d2 = document.getElementById('d2-group');
  if (d2 && modes.some(m => m.startsWith('d2_'))) d2.style.display = '';
});
</script>
</body>
</html>
