
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Vision Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e; color: #eee;
    font-family: system-ui, sans-serif;
    min-height: 100vh;
  }
  #layout {
    display: flex; min-height: 100vh;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px; min-width: 260px;
    background: #16213e;
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    border-right: 1px solid #0f3460;
    overflow-y: auto;
  }
  #sidebar h2 {
    font-size: 0.9rem; color: #aaa;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .video-card {
    cursor: pointer; border-radius: 8px;
    overflow: hidden; background: #1a1a2e;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
  }
  .video-card:hover { border-color: #e94560; transform: scale(1.02); }
  .video-card.active { border-color: #e94560; }
  .video-card img {
    width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
  }
  .video-card .card-title {
    padding: 6px 8px; font-size: 0.75rem; color: #ccc;
    line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Main ── */
  #main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 20px;
    overflow-y: auto;
  }
  h1 { margin-bottom: 10px; font-size: 1.4rem; }
  #info { font-size: 0.85rem; color: #aaa; margin-bottom: 16px; }
  .row {
    display: flex; gap: 8px; margin-bottom: 12px;
    width: 100%; max-width: 800px; align-items: center;
  }
  #url-input {
    flex: 1; padding: 10px 14px; font-size: 1rem;
    border: 1px solid #333; border-radius: 6px;
    background: #16213e; color: #eee; outline: none;
  }
  #url-input:focus { border-color: #e94560; }
  select {
    padding: 10px 14px; font-size: 1rem;
    border: 1px solid #333; border-radius: 6px;
    background: #16213e; color: #eee; outline: none;
    cursor: pointer; flex: 1;
  }
  button {
    padding: 10px 24px; font-size: 1rem; border: none;
    border-radius: 6px; background: #e94560; color: #fff; cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: #c73650; }
  button:disabled { background: #555; cursor: wait; }
  #status { font-size: 0.9rem; color: #aaa; margin-bottom: 12px; min-height: 1.2em; }
  #output { text-align: center; width: 100%; max-width: 800px; }
  #output img {
    border-radius: 8px; width: 100%; background: #000; display: block;
  }
  #stats {
    display: flex; gap: 16px; justify-content: center;
    margin-top: 8px; font-size: 0.8rem; font-variant-numeric: tabular-nums;
  }
  .stat { padding: 4px 10px; border-radius: 4px; background: #16213e; }
  .stat-label { color: #777; }
  .stat-value { color: #eee; font-weight: 600; }
  .stat-good { color: #16c79a; }
  .stat-warn { color: #f5a623; }
  .stat-bad { color: #e94560; }
  #controls {
    display: flex; align-items: center; gap: 10px;
    margin-top: 10px; width: 100%;
  }
  #play-btn {
    padding: 8px 16px; font-size: 1.2rem; min-width: 44px;
  }
  #slider {
    flex: 1; height: 6px; cursor: pointer;
    accent-color: #e94560;
  }
  #time-display {
    font-size: 0.85rem; color: #aaa; min-width: 100px; text-align: right;
    font-variant-numeric: tabular-nums;
  }

  @media (max-width: 768px) {
    #layout { flex-direction: column; }
    #sidebar {
      width: 100%; min-width: unset;
      flex-direction: row; overflow-x: auto;
      border-right: none; border-bottom: 1px solid #0f3460;
      padding: 10px;
    }
    #sidebar h2 { display: none; }
    .video-card { min-width: 160px; }
  }
</style>
</head>

    <div class="row">
      <select id="mode-select">
        <optgroup label="MediaPipe">
          <option value="pose">Pose Estimation (MediaPipe)</option>

          <option value="face_mesh">Face Mesh</option>

          <option value="face_detect">Face Detection</option>

    </div>

    <div class="row" id="prompt-row" style="display:none;">

      </div>
    </div>
  </div>

</div>

let lastFrameTime = 0;
let fpsCount = 0;
let fpsTimer = performance.now();
let currentFps = 0;

function fetchFrame(t) {
  if (pendingFrame) return;
  pendingFrame = true;
  const mode = getMode();
  let frameUrl = '/frame/' + mode + '?t=' + t.toFixed(3) + '&_=' + Date.now();
  if (mode.startsWith('controlnet')) {
    frameUrl += '&prompt=' + encodeURIComponent(
      document.getElementById('prompt-input').value.trim());
  }

  const rttStart = performance.now();

  fetch(frameUrl).then(resp => {
    const procMs = resp.headers.get('X-Process-Ms');
    return resp.blob().then(blob => ({ blob, procMs }));
  }).then(({ blob, procMs }) => {
    const rttMs = Math.round(performance.now() - rttStart);
    const url = URL.createObjectURL(blob);
    img.src = url;

    // Update stats
    if (procMs) {
      const pm = parseInt(procMs);
      const procEl = document.getElementById('stat-proc');
      procEl.textContent = pm + 'ms';
      procEl.className = 'stat-value ' + (pm < 33 ? 'stat-good' : pm < 100 ? 'stat-warn' : 'stat-bad');
    }

    const rttEl = document.getElementById('stat-rtt');
    rttEl.textContent = rttMs + 'ms';
    rttEl.className = 'stat-value ' + (rttMs < 50 ? 'stat-good' : rttMs < 150 ? 'stat-warn' : 'stat-bad');

    // FPS calculation
    fpsCount++;
    const now = performance.now();
    if (now - fpsTimer >= 1000) {
      currentFps = fpsCount;
      fpsCount = 0;
      fpsTimer = now;
    }
    const fpsEl = document.getElementById('stat-fps');
    fpsEl.textContent = currentFps || '...';
    fpsEl.className = 'stat-value ' + (currentFps >= 24 ? 'stat-good' : currentFps >= 10 ? 'stat-warn' : 'stat-bad');

    // Real-time status
    const statusEl2 = document.getElementById('stat-status');
    const videoFps = fps || 30;
    if (currentFps >= videoFps * 0.9) {
      statusEl2.textContent = 'Real-time';
      statusEl2.className = 'stat-value stat-good';
    } else if (currentFps >= videoFps * 0.5) {
      statusEl2.textContent = 'Slight lag';
      statusEl2.className = 'stat-value stat-warn';
    } else if (currentFps > 0) {
      statusEl2.textContent = 'Lagging (' + Math.round(currentFps/videoFps*100) + '% speed)';
      statusEl2.className = 'stat-value stat-bad';
    } else {
      statusEl2.textContent = '—';
      statusEl2.className = 'stat-value';
    }

    pendingFrame = false;
  }).catch(() => {
    pendingFrame = false;
  });
}

function updateTimeDisplay() {
  timeDisplay.textContent = fmtTime(currentTime) + ' / ' + fmtTime(duration);
}

function togglePlay() {
  if (playing) {
    stop();
  } else {
    play();
  }
}

let sliderInterval = null;
let statsInterval = null;

function play() {
  playing = true;
  playBtn.innerHTML = '&#9646;&#9646;';
  statusEl.textContent = 'Streaming — ' + document.getElementById('mode-select').selectedOptions[0].text;

  // Use MJPEG stream for continuous playback (no per-frame round-trip)
  const mode = getMode();
  let streamUrl = '/stream/' + mode + '?t=' + currentTime.toFixed(3);
  if (mode.startsWith('controlnet')) {
    streamUrl += '&prompt=' + encodeURIComponent(
      document.getElementById('prompt-input').value.trim());
  }

  img.src = streamUrl;

  // Update slider based on elapsed time
  const startTime = currentTime;
  const startWall = performance.now();
  sliderInterval = setInterval(() => {
    if (!playing) return;
    currentTime = startTime + (performance.now() - startWall) / 1000;
    if (currentTime >= duration) {
      currentTime = duration;
      stop();
      return;
    }
    slider.value = Math.round((currentTime / duration) * 1000);
    updateTimeDisplay();
  }, 100);

  // Poll server for live stats during streaming
  statsInterval = setInterval(() => {
    if (!playing) return;
    fetch('/stream_stats').then(r => r.json()).then(s => {
      const procEl = document.getElementById('stat-proc');
      procEl.textContent = s.proc_ms + 'ms';
      procEl.className = 'stat-value ' + (s.proc_ms < 33 ? 'stat-good' : s.proc_ms < 100 ? 'stat-warn' : 'stat-bad');

      document.getElementById('stat-rtt').textContent = 'stream';
      document.getElementById('stat-rtt').className = 'stat-value stat-good';

      const fpsEl = document.getElementById('stat-fps');
      fpsEl.textContent = s.fps;
      fpsEl.className = 'stat-value ' + (s.fps >= 24 ? 'stat-good' : s.fps >= 10 ? 'stat-warn' : 'stat-bad');

      const videoFps = fps || 30;
      const statusEl2 = document.getElementById('stat-status');
      if (s.fps >= videoFps * 0.9) {
        statusEl2.textContent = 'Real-time';
        statusEl2.className = 'stat-value stat-good';
      } else if (s.fps >= videoFps * 0.5) {
        statusEl2.textContent = 'Slight lag';
        statusEl2.className = 'stat-value stat-warn';
      } else if (s.fps > 0) {
        statusEl2.textContent = 'Lagging (' + Math.round(s.fps/videoFps*100) + '%)';
        statusEl2.className = 'stat-value stat-bad';
      }
    }).catch(() => {});
  }, 500);
}

function stop() {
  playing = false;
  playBtn.innerHTML = '&#9654;';
  if (rafId) cancelAnimationFrame(rafId);
  rafId = null;
  if (sliderInterval) { clearInterval(sliderInterval); sliderInterval = null; }
  if (statsInterval) { clearInterval(statsInterval); statsInterval = null; }

  // Switch from MJPEG stream back to single frame
  if (img.src.includes('/stream/')) {
    fetchFrame(currentTime);
  }
  if (statusEl.textContent.startsWith('Streaming') || statusEl.textContent.startsWith('Playing'))
    statusEl.textContent = 'Paused';
}

slider.addEventListener('input', () => {
  seeking = true;
  currentTime = (slider.value / 1000) * duration;
  updateTimeDisplay();
  fetchFrame(currentTime);
});

slider.addEventListener('change', () => {
  seeking = false;
  currentTime = (slider.value / 1000) * duration;
  updateTimeDisplay();
  fetchFrame(currentTime);
});

document.getElementById('mode-select').addEventListener('change', () => {
  if (currentUrl) {
    fetchFrame(currentTime);
    if (playing) {
      statusEl.textContent = 'Playing — ' + document.getElementById('mode-select').selectedOptions[0].text;
    }
  }
});

// GPU on-demand controls
function refreshGpuStatus() {
  fetch('/gpu/status').then(r => r.json()).then(s => {
    const btn = document.getElementById('gpu-btn');
    const gStatus = document.getElementById('gpu-status');
    if (!s.idle_timeout) { btn.style.display = 'none'; return; }

    btn.style.display = '';
    if (s.status === 'off') {
      btn.textContent = 'Start GPU';
      btn.style.background = '#16c79a'; btn.style.color = '#fff';
      btn.disabled = false; gStatus.textContent = '';
    } else if (s.status === 'starting' || s.status === 'setup') {
      btn.textContent = 'Starting...';
      btn.style.background = '#555'; btn.disabled = true;
      gStatus.textContent = s.status === 'setup' ? 'installing deps...' : 'launching instance...';
      gStatus.style.color = '#f5a623';
      setTimeout(refreshGpuStatus, 3000);
      setTimeout(refreshBackendStatus, 5000);
    } else if (s.status === 'ready') {
      btn.textContent = 'Stop GPU';
      btn.style.background = '#e94560'; btn.style.color = '#fff';
      btn.disabled = false;
      const idle = Math.max(0, Math.round((s.idle_timeout - (Date.now()/1000 - s.last_activity)) / 60));
      gStatus.textContent = 'auto-stop in ' + idle + 'min';
      gStatus.style.color = '#777';
      setTimeout(refreshGpuStatus, 30000);
    } else if (s.status === 'stopping') {
      btn.textContent = 'Stopping...';
      btn.style.background = '#555'; btn.disabled = true;
      gStatus.textContent = '';
      setTimeout(refreshGpuStatus, 3000);
      setTimeout(refreshBackendStatus, 2000);
    }
  }).catch(() => { document.getElementById('gpu-btn').style.display = 'none'; });
}

function toggleGpu() {
  fetch('/gpu/status').then(r => r.json()).then(s => {
    if (s.status === 'off') {
      fetch('/gpu/start', { method: 'POST' });
    } else if (s.status === 'ready') {
      fetch('/gpu/stop', { method: 'POST' });
    }
    setTimeout(refreshGpuStatus, 1000);
  });
}

refreshGpuStatus();
</script>
